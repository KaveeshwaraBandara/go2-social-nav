# Phase 6d: Nav2 configuration for the TEB baseline.
#
# IDENTICAL to nav2_dwa.yaml in every respect (frames, costmaps fed by /people_cloud,
# planner, behaviors, velocity caps) EXCEPT the local controller plugin, which is the
# Timed-Elastic-Band planner (teb_local_planner::TebLocalPlannerROS, built from source
# into /opt/teb_ws). Keeping everything else fixed isolates the controller as the only
# difference, so DWA vs TEB is a fair comparison on the same harness.
#
#   * NO static map / AMCL (static identity map->odom; localize off /odom).
#   * NO velocity_smoother -- TEB publishes raw /cmd_vel so its command jerk is measured.
#   * Velocity caps match the stub / DWA (0.6 m/s, 1.0 rad/s), diff-drive style.

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    # TEB optimization is heavier than DWB sampling; 10 Hz is the usual TEB rate.
    # Our jerk metric is computed from /odom on a fixed grid, so the differing
    # /cmd_vel rate does not bias the comparison.
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.5
      stateful: True

    # TEB local planner == the TEB baseline.
    FollowPath:
      plugin: "teb_local_planner::TebLocalPlannerROS"

      teb_autosize: 1.0
      dt_ref: 0.3
      dt_hysteresis: 0.1
      max_samples: 500
      global_plan_overwrite_orientation: True
      allow_init_with_backwards_motion: False
      max_global_plan_lookahead_dist: 3.0
      global_plan_viapoint_sep: 0.3
      global_plan_prune_distance: 1.0
      exact_arc_length: False
      feasibility_check_no_poses: 5
      publish_feedback: False

      # Robot kinematics / limits -- match the stub & DWA caps, diff-drive style.
      max_vel_x: 0.6
      max_vel_x_backwards: 0.2     # must exceed penalty_epsilon (0.1) or TEB warns

      max_vel_y: 0.0
      max_vel_theta: 1.0
      acc_lim_x: 2.5
      acc_lim_theta: 3.2
      min_turning_radius: 0.0          # can rotate in place (diff-drive)
      footprint_model:
        type: "circular"
        radius: 0.35                   # matches costmap robot_radius

      # Goal tolerance
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.5
      free_goal_vel: False

      # Obstacles (pedestrians arrive via the costmap obstacle layer / people_cloud)
      min_obstacle_dist: 0.4           # keep footprint >=0.4 m off obstacle points
      inflation_dist: 0.6
      include_costmap_obstacles: True
      costmap_obstacles_behind_robot_dist: 1.5
      obstacle_poses_affected: 15
      dynamic_obstacle_inflation_dist: 0.6
      include_dynamic_obstacles: True
      costmap_converter_plugin: ""     # use raw costmap cells (no converter at runtime)
      costmap_converter_spin_thread: True
      costmap_converter_rate: 5.0

      # Optimization weights
      no_inner_iterations: 5
      no_outer_iterations: 4
      optimization_activate: True
      optimization_verbose: False
      penalty_epsilon: 0.1
      obstacle_cost_exponent: 4.0
      weight_max_vel_x: 2.0
      weight_max_vel_theta: 1.0
      weight_acc_lim_x: 1.0
      weight_acc_lim_theta: 1.0
      weight_kinematics_nh: 1000.0
      weight_kinematics_forward_drive: 1.0
      weight_kinematics_turning_radius: 1.0
      weight_optimaltime: 1.0          # must be > 0
      weight_shortest_path: 0.0
      weight_obstacle: 100.0
      weight_inflation: 0.2
      weight_dynamic_obstacle: 10.0
      weight_dynamic_obstacle_inflation: 0.2
      weight_viapoint: 1.0
      weight_adapt_factor: 2.0

      # Homotopy-class (parallel trajectory) planning. DISABLED: the parallel planner
      # + multithreading intermittently segfaults controller_server on this build, and
      # single-TEB is a perfectly valid baseline.
      enable_homotopy_class_planning: False
      enable_multithreading: False
      max_number_classes: 4
      selection_cost_hysteresis: 1.0
      selection_prefer_initial_plan: 0.95
      selection_obst_cost_scale: 1.0
      selection_alternative_time_cost: False
      roadmap_graph_no_samples: 15
      roadmap_graph_area_width: 5.0
      roadmap_graph_area_length_scale: 1.0
      h_signature_prescaler: 0.5
      h_signature_threshold: 0.1
      obstacle_heading_threshold: 0.45
      switching_blocking_period: 0.0
      viapoints_all_candidates: True
      delete_detours_backwards: True
      max_ratio_detours_duration_best_duration: 3.0
      visualize_hc_graph: False
      visualize_with_time_as_z_axis_scale: 0.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.35
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: people
        people:
          topic: /people_cloud
          sensor_frame: base
          data_type: "PointCloud2"
          marking: True
          clearing: True
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          obstacle_max_range: 6.0
          obstacle_min_range: 0.0
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          observation_persistence: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.05
      robot_radius: 0.35
      track_unknown_space: false
      # Pedestrians are DYNAMIC -> kept out of the global costmap (same as DWA config)
      # so NavFn plans a stable path; the local costmap + TEB handle the moving people.
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
